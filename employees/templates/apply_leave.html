{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">

        <h4>Apply Leave</h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">

                    Leave Type

                </label>

                <select
                    name="leave_type"
                    class="form-control">

                    <option>Casual</option>
                    <option>Sick</option>
                    <option>Annual</option>
                    <option>Work From Home</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Start Date

                </label>

                <input
                    type="date"
                    name="start_date"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    End Date

                </label>

                <input
                    type="date"
                    name="end_date"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Reason

                </label>

                <textarea
                    name="reason"
                    class="form-control"
                    rows="4"></textarea>

            </div>

            <button class="btn btn-primary">

                Apply Leave

            </button>

        </form>

    </div>

</div>

{% endblock %}
