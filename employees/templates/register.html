<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3>Register</h3>

                </div>

                <div class="card-body">

                    {% if error %}

                    <div class="alert alert-danger">

                        {{ error }}

                    </div>

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <input
                            type="text"
                            name="username"
                            class="form-control mb-3"
                            placeholder="Username">

                        <input
                            type="email"
                            name="email"
                            class="form-control mb-3"
                            placeholder="Email">

                        <input
                            type="password"
                            name="password"
                            class="form-control mb-3"
                            placeholder="Password">

                        <button
                            class="btn btn-success w-100">

                            Register

                        </button>

                    </form>

                    <div class="mt-3">

                        <a href="{% url 'login' %}">

                            Already have an account?

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
